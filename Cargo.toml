[package]
name = "p5r_loader"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]
name = "p5r_hooks"
path = "src/lib.rs"

[[bin]]
name = "p5r_loader"
path = "src/bin.rs"

[dependencies]
winapi = { version = "0.3.9", features = ["fileapi", "handleapi", "winbase", "minwindef", "ntdef"] }
once_cell = "1.21.3"
retour = { version = "0.3.1", features = ["static-detour"] }
windows = { version = "0.61.3", features = [
    "Win32_System_Threading",
    "Win32_System_ProcessStatus",
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_Diagnostics_Debug",
    "Win32_Security",
    "Win32_Storage",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
] }